name: validate

on:
  push:
  pull_request:

jobs:
  conformance:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install --quiet jsonschema
      - name: Check JSON syntax
        run: |
          python -B - <<'PY'
          import json
          from pathlib import Path
          for path in Path('.').rglob('*.json'):
              if '.git' in path.parts:
                  continue
              json.loads(path.read_text(encoding='utf-8-sig'))
          PY
      - name: Run unit tests
        run: python -B -m unittest discover -s tests
      - name: Check generated per-skill READMEs
        run: python -B tools/aisp_readme.py examples --check-all
      - name: Check generated Agent Skills sidecars
        run: python -B tools/aisp_skill_md.py examples --check-all
      - name: Validate Agent Skills bridges
        run: python -B tools/aisp_validate_agent_skill_bridge.py examples/aisp --strict-readme
      - name: Validate example AISP directory
        run: python -B tools/aisp_validate.py examples/aisp
      - name: Validate JSON report output
        run: python -B tools/aisp_validate.py --json examples/aisp/yijing_aisp
      - name: Validate example AISP directory with strict README checks
        run: python -B tools/aisp_validate.py --strict-readme examples/aisp
      - name: Validate hard tool-enforcement evidence
        run: python -B tools/aisp_validate.py --strict-tools --runtime-trace examples/aisp/stock_analysis_aisp/evals/runtime-traces/hard-pass.json examples/aisp/stock_analysis_aisp
      - name: Validate creator hard tool-enforcement evidence
        run: python -B tools/aisp_validate.py --strict-tools --runtime-trace examples/aisp/aisp_creator_evolution_aisp/evals/runtime-traces/hard-pass.json examples/aisp/aisp_creator_evolution_aisp
      - name: Check runtime trace fixture
        run: python -B tools/aisp_check_runtime_trace.py examples/aisp/stock_analysis_aisp examples/aisp/stock_analysis_aisp/evals/runtime-traces/hard-pass.json
      - name: Check creator runtime trace fixture
        run: python -B tools/aisp_check_runtime_trace.py examples/aisp/aisp_creator_evolution_aisp examples/aisp/aisp_creator_evolution_aisp/evals/runtime-traces/hard-pass.json
      - name: Compute provenance hashes
        run: python -B tools/aisp_hash.py --json examples/aisp/yijing_aisp
      - name: Check generated AISP index
        run: python -B examples/aisp/aisp_list.py --check
      - name: Check docs command synchronization
        run: python -B tools/check_doc_sync.py --root .
      - name: Check local Markdown links
        run: python -B tools/check_markdown_links.py --root .
      - name: Check generated artifacts are committed
        run: git diff --exit-code
      - name: Check no untracked artifacts were generated
        run: |
          status="$(git status --porcelain=v1 --untracked-files=all)"
          test -z "$status" || { echo "$status"; exit 1; }
      - name: Check whitespace errors
        run: git diff-tree --check --root -r HEAD
